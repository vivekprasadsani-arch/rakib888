services:
  - type: web
    name: twigate-sms-hub
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: SPREADSHEET_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: NODE_ENV
        value: production
    healthCheckPath: /
    autoDeploy: true
